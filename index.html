<!DOCTYPE html>
<html>
    <head>
        <title>YT Transcriptor</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Youtube Transcriptor</h1>
        <p>get the transcript from a video</p>
        <div class="form-group">
            <label for="url-input">youtube url</label>
            <input type="url" id="url-input" placeholder="https://www.youtube.com/watch?v=...">
            <button id="get-btn">get transcript</button>
        </div>
        <div class="form-group">
            <label for="transcript">transcript</label>
            <textarea id="transcript" placeholder="bla bla bla"></textarea>
            <button id="copy-btn" class="button-copy">copy transcript</button>
        </div>
        <p class="credits">made by aeden (05/04/26)</p>
        <script src="script.js"></script>
    </body>
</html>
